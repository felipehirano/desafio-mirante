<mat-toolbar class="page-header">
  <div class="page-header__content">
    <span class="page-header__title">{{ title }}</span>

    @if (breadcrumbs.length > 0) {
      <nav class="page-header__breadcrumb" aria-label="breadcrumb">
        @for (item of breadcrumbs; track item.label; let last = $last) {
          @if (item.route && !last) {
            <a class="breadcrumb__link" [routerLink]="item.route">{{ item.label }}</a>
          } @else {
            <span class="breadcrumb__current">{{ item.label }}</span>
          }
          @if (!last) {
            <span class="breadcrumb__separator" aria-hidden="true">›</span>
          }
        }
      </nav>
    }
  </div>

  <span class="page-header__spacer"></span>
</mat-toolbar>
