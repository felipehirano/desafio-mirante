<div class="lotes-page" role="main" [attr.aria-label]="'Página de gerenciamento de lotes'">
  <div
    class="sr-only"
    [attr.aria-live]="'polite'"
    [attr.aria-atomic]="'true'"
    role="status">
    @if (facade.isLoading()) {
      <span>Pesquisando lotes...</span>
    } @else if (facade.lotes().length > 0) {
      <span>{{ facade.lotes().length }} lotes encontrados</span>
    } @else if (facade.hasFilter()) {
      <span>Nenhum lote encontrado com os filtros aplicados</span>
    }
  </div>

  <mat-card class="content-card" [attr.aria-label]="'Card de gerenciamento de lotes'">
    <mat-card-content class="card-content">
      <div class="lotes-header">
        <h2 class="lotes-title">Lotes</h2>
        <span class="lotes-count">{{ facade.lotes().length }} registro(s)</span>
      </div>

      <div class="filter-section">
        <app-lotes-filter [isLoading]="facade.isLoading()" (filterChange)="onFilterChange($event)"></app-lotes-filter>
      </div>

      <div class="actions-section">
        <app-lotes-actions [selectedCount]="selectedCount()" (action)="onAction($event)"></app-lotes-actions>
      </div>

      <div class="table-section">
        <app-lotes-table
          [lotes]="facade.lotes()"
          [isLoading]="facade.isLoading()"
          (selectionChange)="onSelectionChange($event)"
        >
        </app-lotes-table>
      </div>
    </mat-card-content>
  </mat-card>
</div>
