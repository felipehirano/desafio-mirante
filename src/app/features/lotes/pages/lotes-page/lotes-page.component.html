<div class="lotes-page">
  <app-lotes-filter (filterChange)="onFilterChange($event)"></app-lotes-filter>

  <mat-card class="content-card">
    <mat-card-content>
      <app-lotes-table
        [lotes]="facade.lotes()"
        [isLoading]="facade.isLoading()">
      </app-lotes-table>
    </mat-card-content>
  </mat-card>
</div>
